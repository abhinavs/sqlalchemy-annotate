name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        sqlalchemy: ["2.0.*", ">=2.0"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]" "sqlalchemy==${{ matrix.sqlalchemy }}"

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q --cov=sqlalchemy_annotate --cov-report=term-missing

  example-check:
    # Dogfood: the committed example app must stay annotated and current.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv venv && uv pip install -e .
      - working-directory: examples/fastapi_app
        run: uv run sqlalchemy-annotate check --models models --config /dev/null
